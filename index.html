<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>問題と人力</title>
  <style>
    :root{
      --bg:#f7f7fb;
      --card:#ffffff;
      --line:#d8ddea;
      --text:#1f2937;
      --muted:#6b7280;
      --accent:#4f46e5;
      --accent-soft:#eef2ff;
      --danger:#b91c1c;
      --danger-soft:#fef2f2;
      --ok:#0f766e;
      --ok-soft:#ecfdf5;
      --shadow:0 10px 28px rgba(0,0,0,.05);
      --radius:20px;
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      background:var(--bg);
      color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Hiragino Sans","Yu Gothic UI","Yu Gothic",Meiryo,sans-serif;
    }

    .wrap{
      max-width:860px;
      margin:0 auto;
      padding:18px 14px 30px;
    }

    .title{
      font-size:32px;
      font-weight:900;
      margin:0 0 18px;
      letter-spacing:.02em;
    }

    .topbar{
      display:grid;
      grid-template-columns: 1fr auto auto;
      gap:10px;
      align-items:end;
      margin-bottom:18px;
    }

    .topbar .field{
      display:flex;
      flex-direction:column;
      gap:8px;
    }

    .topbar label{
      font-size:15px;
      font-weight:800;
    }

    input[type="password"],
    input[type="text"],
    textarea{
      width:100%;
      border:2px solid var(--line);
      border-radius:16px;
      background:#fff;
      outline:none;
      font-size:16px;
      padding:12px 14px;
      transition:.18s ease;
    }

    input[type="password"]:focus,
    input[type="text"]:focus,
    textarea:focus{
      border-color:var(--accent);
      box-shadow:0 0 0 4px rgba(79,70,229,.10);
    }

    .mode-btn{
      height:50px;
      min-width:92px;
      padding:0 16px;
      border-radius:16px;
      border:2px solid var(--line);
      background:#fff;
      color:var(--text);
      font-size:15px;
      font-weight:800;
      cursor:pointer;
    }

    .mode-btn.active{
      border-color:#c7d2fe;
      background:var(--accent-soft);
      color:var(--accent);
    }

    .section{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:24px;
      box-shadow:var(--shadow);
      padding:18px;
      margin-bottom:18px;
    }

    .section-title{
      font-size:24px;
      font-weight:900;
      margin:0 0 14px;
    }

    textarea{
      min-height:190px;
      resize:vertical;
      line-height:1.8;
    }

    .actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-top:12px;
    }

    button.action{
      border:none;
      border-radius:16px;
      padding:13px 20px;
      font-size:16px;
      font-weight:800;
      cursor:pointer;
      transition:.18s ease;
    }

    button.action:hover{ transform:translateY(-1px); }
    button.action:active{ transform:translateY(0); }
    button.action:disabled{
      opacity:.6;
      cursor:not-allowed;
      transform:none;
    }

    .primary{
      background:var(--accent-soft);
      color:var(--accent);
    }

    .ghost{
      background:#f3f4f6;
      color:#374151;
    }

    .danger{
      background:#fff1f2;
      color:#be123c;
      border:1px solid #fecdd3;
    }

    .status{
      min-height:24px;
      margin-top:12px;
      color:var(--muted);
      font-size:14px;
      font-weight:700;
    }

    .pill{
      display:inline-block;
      padding:6px 12px;
      border-radius:999px;
      font-size:13px;
      font-weight:900;
      margin-bottom:10px;
      border:1px solid transparent;
    }

    .pill.ok{
      color:var(--ok);
      background:var(--ok-soft);
      border-color:#a7f3d0;
    }

    .pill.warn{
      color:#b45309;
      background:#fffbeb;
      border-color:#fde68a;
    }

    .pill.bad{
      color:var(--danger);
      background:var(--danger-soft);
      border-color:#fecaca;
    }

    .output{
      white-space:pre-wrap;
      line-height:1.9;
      font-size:17px;
      min-height:220px;
    }

    .assumption-panel{
      margin-top:14px;
      border-top:1px dashed var(--line);
      padding-top:14px;
    }

    .assumption-panel.hidden{
      display:none;
    }

    .assumption-list{
      display:grid;
      gap:10px;
      margin-top:8px;
    }

    .assumption-item{
      border:1px solid var(--line);
      border-radius:16px;
      padding:12px;
      background:#fff;
    }

    .assumption-key{
      font-size:15px;
      font-weight:900;
      margin-bottom:4px;
    }

    .assumption-meta{
      font-size:12px;
      color:var(--muted);
      margin-bottom:8px;
    }

    .assumption-desc{
      font-size:13px;
      color:#4b5563;
      line-height:1.7;
      margin-bottom:8px;
    }

    .mini-note{
      font-size:13px;
      color:var(--muted);
      line-height:1.7;
      margin-bottom:10px;
    }

    @media (max-width: 640px){
      .title{
        font-size:28px;
      }

      .topbar{
        grid-template-columns: 1fr 1fr;
      }

      .topbar .field{
        grid-column:1 / -1;
      }

      .mode-btn{
        width:100%;
      }

      .section-title{
        font-size:22px;
      }

      .output{
        font-size:16px;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1 class="title">問題と人力</h1>

    <div class="topbar">
      <div class="field">
        <label for="passcode">パスコード</label>
        <input type="password" id="passcode" placeholder="パスコードを入力" />
      </div>
      <button class="mode-btn active" id="modeWeirdBtn" type="button">珍問</button>
      <button class="mode-btn" id="modeKidBtn" type="button">小学生</button>
    </div>

    <section class="section">
      <h2 class="section-title">1. 問題文</h2>

      <textarea id="question" placeholder="例：
富士山で琵琶湖を埋められるか？
25mプールに一万円札を敷き詰めたら何枚必要か？
りんごが5個あります。3個食べました。残りはいくつですか？"></textarea>

      <div class="actions">
        <button class="action primary" id="prepareBtn">開く</button>
        <button class="action ghost" id="clearBtn">クリア</button>
      </div>

      <div class="status" id="status">待機中です。</div>
    </section>

    <section class="section">
      <h2 class="section-title">2. 前提をユーザーが確定</h2>

      <div id="prepareBadge"></div>
      <div class="output" id="prepareSummary">ここに、AIが整理した前提候補の要約が表示されます。</div>

      <div class="assumption-panel hidden" id="assumptionPanel">
        <div class="mini-note">
          必要なら下の値や言い方を修正してください。修正しなければ、そのままの前提で計算します。
        </div>

        <div class="assumption-list" id="assumptionList"></div>

        <div class="actions">
          <button class="action primary" id="solveBtn">この前提で計算する</button>
          <button class="action danger" id="resetAssumptionsBtn">前提候補を消す</button>
        </div>
      </div>
    </section>

    <section class="section">
      <h2 class="section-title">3. 計算結果</h2>

      <div id="resultBadge"></div>
      <div class="output" id="resultOutput">ここに、途中経過・式・結論が表示されます。</div>
    </section>
  </div>

  <script>
    const WORKER_URL = "https://cal.gudafutanu.workers.dev/solve";
    // 例: https://your-worker-name.your-subdomain.workers.dev/solve

    let currentMode = "weird";
    let preparedData = null;

    const passcodeEl = document.getElementById("passcode");
    const questionEl = document.getElementById("question");
    const statusEl = document.getElementById("status");

    const modeWeirdBtn = document.getElementById("modeWeirdBtn");
    const modeKidBtn = document.getElementById("modeKidBtn");

    const prepareBtn = document.getElementById("prepareBtn");
    const clearBtn = document.getElementById("clearBtn");
    const solveBtn = document.getElementById("solveBtn");
    const resetAssumptionsBtn = document.getElementById("resetAssumptionsBtn");

    const prepareSummaryEl = document.getElementById("prepareSummary");
    const prepareBadgeEl = document.getElementById("prepareBadge");

    const assumptionPanelEl = document.getElementById("assumptionPanel");
    const assumptionListEl = document.getElementById("assumptionList");

    const resultOutputEl = document.getElementById("resultOutput");
    const resultBadgeEl = document.getElementById("resultBadge");

    function setStatus(msg){
      statusEl.textContent = msg;
    }

    function setBadge(target, type, text){
      target.innerHTML = "";
      if (!text) return;
      const div = document.createElement("div");
      div.className = `pill ${type}`;
      div.textContent = text;
      target.appendChild(div);
    }

    function setMode(mode){
      currentMode = mode;
      modeWeirdBtn.classList.toggle("active", mode === "weird");
      modeKidBtn.classList.toggle("active", mode === "kid");

      if (mode === "weird") {
        questionEl.placeholder = `例：
富士山で琵琶湖を埋められるか？
25mプールに一万円札を敷き詰めたら何枚必要か？
25mプールに一万円札を体積で詰めたら何枚必要か？`;
      } else {
        questionEl.placeholder = `例：
りんごが5個あります。3個食べました。残りはいくつですか？
100円のえんぴつを3本買いました。代金はいくらですか？
12個のあめを4人で同じ数ずつ分けると1人何個ですか？`;
      }
    }

    function escapeHtml(str){
      return String(str)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    function renderPrepare(data){
      preparedData = data;

      const lines = [];
      lines.push("【問題】");
      lines.push(data.question || "");
      lines.push("");

      if (data.problem_type) {
        lines.push("【問題のタイプ】");
        lines.push(data.problem_type);
        lines.push("");
      }

      lines.push("【AIが考えた解き方】");
      lines.push(data.plan || "まだ整理できませんでした。");
      lines.push("");

      lines.push("【確認】");
      lines.push(data.confirmation_message || "下の前提候補を確認してください。");

      if (Array.isArray(data.missing_conditions) && data.missing_conditions.length) {
        lines.push("");
        lines.push("【結果が変わるポイント】");
        data.missing_conditions.forEach(v => lines.push(`・${v}`));
      }

      prepareSummaryEl.textContent = lines.join("\n");

      if (data.ready_to_solve) {
        setBadge(prepareBadgeEl, "warn", "前提候補を確認してください");
      } else {
        setBadge(prepareBadgeEl, "bad", "このままでは計算できません");
      }

      renderAssumptionInputs(data.assumptions || []);
    }

    function renderAssumptionInputs(assumptions){
      assumptionListEl.innerHTML = "";

      if (!Array.isArray(assumptions) || assumptions.length === 0) {
        assumptionPanelEl.classList.add("hidden");
        return;
      }

      assumptionPanelEl.classList.remove("hidden");

      assumptions.forEach((item, index) => {
        const wrap = document.createElement("div");
        wrap.className = "assumption-item";

        const key = item.key || `assumption_${index + 1}`;
        const label = item.label || key;
        const value = item.value ?? "";
        const unit = item.unit || "";
        const description = item.description || "";
        const editable = item.editable !== false;

        wrap.innerHTML = `
          <div class="assumption-key">${escapeHtml(label)}</div>
          <div class="assumption-meta">key: ${escapeHtml(key)} ${unit ? " / 単位: " + escapeHtml(unit) : ""}</div>
          <div class="assumption-desc">${escapeHtml(description)}</div>
          <input
            type="text"
            data-key="${escapeHtml(key)}"
            data-label="${escapeHtml(label)}"
            data-unit="${escapeHtml(unit)}"
            data-description="${escapeHtml(description)}"
            value="${escapeHtml(value)}"
            ${editable ? "" : "readonly"}
          />
        `;

        assumptionListEl.appendChild(wrap);
      });
    }

    function collectAssumptionsFromUI(){
      const inputs = assumptionListEl.querySelectorAll("input[data-key]");
      return Array.from(inputs).map(input => ({
        key: input.dataset.key || "",
        label: input.dataset.label || "",
        unit: input.dataset.unit || "",
        description: input.dataset.description || "",
        value: input.value.trim()
      }));
    }

    function renderSolve(data){
      const lines = [];

      lines.push("【問題】");
      lines.push(data.question || "");
      lines.push("");

      if (data.problem_type) {
        lines.push("【問題のタイプ】");
        lines.push(data.problem_type);
        lines.push("");
      }

      if (Array.isArray(data.assumptions_used) && data.assumptions_used.length) {
        lines.push("【使った前提】");
        data.assumptions_used.forEach(v => lines.push(`・${v}`));
        lines.push("");
      }

      if (Array.isArray(data.used_values) && data.used_values.length) {
        lines.push("【使った数値】");
        data.used_values.forEach(v => lines.push(`・${v}`));
        lines.push("");
      }

      if (Array.isArray(data.reasoning_steps) && data.reasoning_steps.length) {
        lines.push("【考え方の流れ】");
        data.reasoning_steps.forEach((v, i) => lines.push(`${i + 1}. ${v}`));
        lines.push("");
      }

      if (Array.isArray(data.calculation_steps) && data.calculation_steps.length) {
        lines.push("【計算の途中】");
        data.calculation_steps.forEach((v, i) => lines.push(`${i + 1}. ${v}`));
        lines.push("");
      }

      if (data.final_formula) {
        lines.push("【式】");
        lines.push(data.final_formula);
        lines.push("");
      }

      if (data.interpretation) {
        lines.push("【この結果の意味】");
        lines.push(data.interpretation);
        lines.push("");
      }

      lines.push("【結論】");
      lines.push(data.conclusion || "結論を出せませんでした。");

      if (Array.isArray(data.notes) && data.notes.length) {
        lines.push("");
        lines.push("【補足】");
        data.notes.forEach(v => lines.push(`・${v}`));
      }

      resultOutputEl.textContent = lines.join("\n");

      if (data.can_answer) {
        setBadge(resultBadgeEl, "ok", "途中経過つきで計算しました");
      } else {
        setBadge(resultBadgeEl, "bad", "計算できませんでした");
      }
    }

    async function requestWorker(payload){
      const passcode = passcodeEl.value.trim();

      if (!passcode) {
        throw new Error("パスコードを入力してください。");
      }

      const res = await fetch(WORKER_URL, {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "X-App-Passcode": passcode
        },
        body: JSON.stringify(payload)
      });

      const text = await res.text();

      let data;
      try {
        data = JSON.parse(text);
      } catch {
        throw new Error("Workerの返答がJSONではありません。\n\n" + text);
      }

      if (!res.ok || data.error) {
        throw new Error(data.error || "エラーが発生しました。");
      }

      return data;
    }

    async function callPrepare(){
      const question = questionEl.value.trim();

      if (!question) {
        setStatus("まず問題文を入力してください。");
        setBadge(prepareBadgeEl, "bad", "入力が必要です");
        prepareSummaryEl.textContent = "問題文が空です。";
        return;
      }

      setStatus("前提候補を整理しています...");
      prepareBtn.disabled = true;
      solveBtn.disabled = true;
      clearBtn.disabled = true;
      resetAssumptionsBtn.disabled = true;

      try {
        const data = await requestWorker({
          action: "prepare",
          mode: currentMode,
          question
        });

        renderPrepare(data);
        resultOutputEl.textContent = "ここに、途中経過・式・結論が表示されます。";
        resultBadgeEl.innerHTML = "";
        setStatus("前提候補を表示しました。");
      } catch (err) {
        console.error(err);
        setBadge(prepareBadgeEl, "bad", "エラー");
        prepareSummaryEl.textContent = "エラーが発生しました。\n\n" + (err.message || String(err));
        setStatus("エラーが発生しました。");
      } finally {
        prepareBtn.disabled = false;
        solveBtn.disabled = false;
        clearBtn.disabled = false;
        resetAssumptionsBtn.disabled = false;
      }
    }

    async function callSolve(){
      const question = questionEl.value.trim();

      if (!question) {
        setStatus("まず問題文を入力してください。");
        return;
      }

      if (!preparedData) {
        setStatus("先に「開く」を押してください。");
        return;
      }

      const finalAssumptions = collectAssumptionsFromUI();

      setStatus("確定前提で計算しています...");
      prepareBtn.disabled = true;
      solveBtn.disabled = true;
      clearBtn.disabled = true;
      resetAssumptionsBtn.disabled = true;

      try {
        const data = await requestWorker({
          action: "solve",
          mode: currentMode,
          question,
          assumptions: finalAssumptions
        });

        renderSolve(data);
        setStatus("計算結果を表示しました。");
      } catch (err) {
        console.error(err);
        setBadge(resultBadgeEl, "bad", "エラー");
        resultOutputEl.textContent = "エラーが発生しました。\n\n" + (err.message || String(err));
        setStatus("エラーが発生しました。");
      } finally {
        prepareBtn.disabled = false;
        solveBtn.disabled = false;
        clearBtn.disabled = false;
        resetAssumptionsBtn.disabled = false;
      }
    }

    function resetAssumptions(){
      preparedData = null;
      assumptionListEl.innerHTML = "";
      assumptionPanelEl.classList.add("hidden");
      prepareSummaryEl.textContent = "ここに、AIが整理した前提候補の要約が表示されます。";
      prepareBadgeEl.innerHTML = "";
      resultOutputEl.textContent = "ここに、途中経過・式・結論が表示されます。";
      resultBadgeEl.innerHTML = "";
      setStatus("前提候補を消しました。");
    }

    function clearAll(){
      questionEl.value = "";
      preparedData = null;
      prepareSummaryEl.textContent = "ここに、AIが整理した前提候補の要約が表示されます。";
      resultOutputEl.textContent = "ここに、途中経過・式・結論が表示されます。";
      prepareBadgeEl.innerHTML = "";
      resultBadgeEl.innerHTML = "";
      assumptionListEl.innerHTML = "";
      assumptionPanelEl.classList.add("hidden");
      setStatus("待機中です。");
      questionEl.focus();
    }

    modeWeirdBtn.addEventListener("click", () => setMode("weird"));
    modeKidBtn.addEventListener("click", () => setMode("kid"));

    prepareBtn.addEventListener("click", callPrepare);
    solveBtn.addEventListener("click", callSolve);
    clearBtn.addEventListener("click", clearAll);
    resetAssumptionsBtn.addEventListener("click", resetAssumptions);
  </script>
</body>
</html>
