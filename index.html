<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>問題と人力</title>

  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#4f46e5">
  <link rel="apple-touch-icon" href="icon-180.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="問題と人力">

  <style>
    :root{
      --bg:#f7f7fb;
      --card:#ffffff;
      --line:#d8ddea;
      --text:#1f2937;
      --muted:#6b7280;
      --accent:#4f46e5;
      --accent-soft:#eef2ff;
      --danger:#ff5c5c;
      --danger-soft:#fff1f2;
      --ok:#0f766e;
      --ok-soft:#ecfdf5;
      --shadow:0 10px 28px rgba(0,0,0,.05);
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      background:var(--bg);
      color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Hiragino Sans","Yu Gothic UI","Yu Gothic",Meiryo,sans-serif;
    }

    .wrap{
      max-width:860px;
      margin:0 auto;
      padding:18px 14px 140px;
    }

    .title{
      font-size:32px;
      font-weight:900;
      margin:0 0 18px;
      letter-spacing:.02em;
    }

    .pass-row{
      display:grid;
      grid-template-columns:auto 1fr;
      gap:12px;
      align-items:center;
      margin-bottom:18px;
    }

    .pass-row label{
      font-size:15px;
      font-weight:800;
      white-space:nowrap;
    }

    input[type="password"],
    input[type="text"],
    textarea{
      width:100%;
      border:2px solid var(--line);
      border-radius:16px;
      background:#fff;
      outline:none;
      font-size:16px;
      padding:12px 14px;
      transition:.18s ease;
    }

    input[type="password"]:focus,
    input[type="text"]:focus,
    textarea:focus{
      border-color:var(--accent);
      box-shadow:0 0 0 4px rgba(79,70,229,.10);
    }

    .section{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:24px;
      box-shadow:var(--shadow);
      padding:18px;
      margin-bottom:18px;
    }

    .section-head{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      margin-bottom:14px;
    }

    .section-title{
      font-size:24px;
      font-weight:900;
      margin:0;
    }

    .speak-btn{
      border:none;
      background:#f3f4f6;
      color:#374151;
      border-radius:14px;
      padding:10px 14px;
      font-size:18px;
      cursor:pointer;
      font-weight:800;
    }

    .speak-btn:hover{
      transform:translateY(-1px);
    }

    .mode-wrap{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-bottom:14px;
    }

    .mode-btn{
      border:2px solid var(--line);
      background:#fff;
      color:var(--text);
      padding:10px 18px;
      border-radius:16px;
      font-size:15px;
      font-weight:800;
      cursor:pointer;
    }

    .mode-btn.active{
      border-color:#c7d2fe;
      background:var(--accent-soft);
      color:var(--accent);
    }

    textarea{
      min-height:200px;
      resize:vertical;
      line-height:1.8;
    }

    .actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-top:12px;
    }

    button.action{
      border:none;
      border-radius:16px;
      padding:13px 20px;
      font-size:16px;
      font-weight:800;
      cursor:pointer;
      transition:.18s ease;
    }

    button.action:hover{ transform:translateY(-1px); }
    button.action:active{ transform:translateY(0); }
    button.action:disabled{
      opacity:.6;
      cursor:not-allowed;
      transform:none;
    }

    .primary{
      background:var(--accent-soft);
      color:var(--accent);
    }

    .ghost{
      background:#f3f4f6;
      color:#374151;
    }

    .danger{
      background:#fff1f2;
      color:#be123c;
      border:1px solid #fecdd3;
    }

    .ok-btn{
      background:var(--ok-soft);
      color:var(--ok);
      border:1px solid #a7f3d0;
    }

    .status{
      min-height:24px;
      margin-top:12px;
      color:var(--muted);
      font-size:14px;
      font-weight:700;
      line-height:1.7;
    }

    .pill{
      display:inline-block;
      padding:6px 12px;
      border-radius:999px;
      font-size:13px;
      font-weight:900;
      margin-bottom:10px;
      border:1px solid transparent;
    }

    .pill.ok{
      color:var(--ok);
      background:var(--ok-soft);
      border-color:#a7f3d0;
    }

    .pill.warn{
      color:#b45309;
      background:#fffbeb;
      border-color:#fde68a;
    }

    .pill.bad{
      color:#b91c1c;
      background:#fef2f2;
      border-color:#fecaca;
    }

    .output{
      white-space:pre-wrap;
      line-height:1.9;
      font-size:17px;
      min-height:260px;
    }

    .assumption-panel{
      margin-top:14px;
      border-top:1px dashed var(--line);
      padding-top:14px;
    }

    .assumption-panel.hidden{
      display:none;
    }

    .assumption-list{
      display:grid;
      gap:10px;
      margin-top:8px;
    }

    .assumption-item{
      border:1px solid var(--line);
      border-radius:16px;
      padding:12px;
      background:#fff;
    }

    .assumption-key{
      font-size:15px;
      font-weight:900;
      margin-bottom:4px;
    }

    .assumption-meta{
      font-size:12px;
      color:var(--muted);
      margin-bottom:8px;
    }

    .assumption-desc{
      font-size:13px;
      color:#4b5563;
      line-height:1.7;
      margin-bottom:8px;
    }

    .mini-note{
      font-size:13px;
      color:var(--muted);
      line-height:1.7;
      margin-bottom:10px;
    }

    .end-floating{
      position:fixed;
      left:0;
      right:0;
      bottom:20px;
      display:flex;
      justify-content:center;
      pointer-events:none;
      z-index:999;
    }

    .end-mini{
      pointer-events:auto;
      width:180px;
      padding:14px 20px;
      font-size:18px;
      font-weight:900;
      border-radius:14px;
      border:none;
      background:var(--danger);
      color:#fff;
      box-shadow:0 6px 20px rgba(0,0,0,.18);
      cursor:pointer;
    }

    .end-mini:active{
      transform:translateY(2px);
    }

    @media (max-width: 640px){
      .title{
        font-size:28px;
      }

      .section-title{
        font-size:22px;
      }

      .output{
        font-size:16px;
      }

      .pass-row{
        grid-template-columns:1fr;
        gap:8px;
      }

      .end-mini{
        width:160px;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1 class="title">問題と人力</h1>

    <div class="pass-row">
      <label for="passcode">パスコード</label>
      <input type="password" id="passcode" placeholder="パスコードを入力" />
    </div>

    <section class="section">
      <div class="section-head">
        <h2 class="section-title">1. 問題文</h2>
        <button class="speak-btn" id="speakQuestionBtn" type="button" title="問題文を読む">🔈</button>
      </div>

      <div class="mode-wrap">
        <button class="mode-btn active" id="modeWeirdBtn" type="button">珍問</button>
        <button class="mode-btn" id="modeKidBtn" type="button">小学生</button>
      </div>

      <textarea id="question" placeholder="例：
富士山で琵琶湖を埋められるか？
25mプールに一万円札を敷き詰めたら何枚必要か？
りんごが5個あります。3個食べました。残りはいくつですか？"></textarea>

      <div class="actions">
        <button class="action primary" id="prepareBtn">質問する</button>
        <button class="action ok-btn" id="micBtn">🎤 音声入力</button>
        <button class="action ghost" id="editBtn">編集</button>
        <button class="action ghost" id="clearBtn">クリア</button>
        <button class="action ghost" id="stopReadingBtn">🔇 停止</button>
      </div>

      <div class="status" id="status">待機中です。</div>
    </section>

    <section class="section">
      <div class="section-head">
        <h2 class="section-title">2. 前提</h2>
        <button class="speak-btn" id="speakPrepareBtn" type="button" title="前提を読む">🔈</button>
      </div>

      <div id="prepareBadge"></div>
      <div class="output" id="prepareSummary">ここに、AIが整理した前提候補の要約が表示されます。</div>

      <div class="assumption-panel hidden" id="assumptionPanel">
        <div class="mini-note">
          必要なら下の値や言い方を修正してください。修正しなければ、そのままの前提で計算します。
        </div>

        <div class="assumption-list" id="assumptionList"></div>

        <div class="actions">
          <button class="action primary" id="solveBtn">この前提で計算する</button>
          <button class="action danger" id="resetAssumptionsBtn">前提候補を消す</button>
        </div>
      </div>
    </section>

    <section class="section">
      <div class="section-head">
        <h2 class="section-title">3. 計算結果</h2>
        <button class="speak-btn" id="speakResultBtn" type="button" title="計算結果を読む">🔈</button>
      </div>

      <div id="resultBadge"></div>
      <div class="output" id="resultOutput">ここに、途中経過・式・結論が表示されます。</div>
    </section>
  </div>

  <div class="end-floating">
    <button id="endBtn" class="end-mini">終了</button>
  </div>

  <script>
    const WORKER_URL = "https://cal.gudafutanu.workers.dev/solve";
    const PASSCODE_STORAGE_KEY = "mondai_to_jinriki_passcode_v1";

    let currentMode = "weird";
    let preparedData = null;

    const passcodeEl = document.getElementById("passcode");
    const questionEl = document.getElementById("question");
    const statusEl = document.getElementById("status");

    const modeWeirdBtn = document.getElementById("modeWeirdBtn");
    const modeKidBtn = document.getElementById("modeKidBtn");

    const prepareBtn = document.getElementById("prepareBtn");
    const micBtn = document.getElementById("micBtn");
    const editBtn = document.getElementById("editBtn");
    const clearBtn = document.getElementById("clearBtn");
    const solveBtn = document.getElementById("solveBtn");
    const endBtn = document.getElementById("endBtn");
    const resetAssumptionsBtn = document.getElementById("resetAssumptionsBtn");
    const stopReadingBtn = document.getElementById("stopReadingBtn");

    const speakQuestionBtn = document.getElementById("speakQuestionBtn");
    const speakPrepareBtn = document.getElementById("speakPrepareBtn");
    const speakResultBtn = document.getElementById("speakResultBtn");

    const prepareSummaryEl = document.getElementById("prepareSummary");
    const prepareBadgeEl = document.getElementById("prepareBadge");

    const assumptionPanelEl = document.getElementById("assumptionPanel");
    const assumptionListEl = document.getElementById("assumptionList");

    const resultOutputEl = document.getElementById("resultOutput");
    const resultBadgeEl = document.getElementById("resultBadge");

    let recognition = null;
    let isListening = false;
    let speaking = false;

    function setStatus(msg){
      statusEl.textContent = msg;
    }

    function setBadge(target, type, text){
      if (!target) return;
      target.innerHTML = "";
      if (!text) return;
      const div = document.createElement("div");
      div.className = `pill ${type}`;
      div.textContent = text;
      target.appendChild(div);
    }

    function setMode(mode){
      currentMode = mode;
      modeWeirdBtn.classList.toggle("active", mode === "weird");
      modeKidBtn.classList.toggle("active", mode === "kid");

      if (mode === "weird") {
        questionEl.placeholder = `例：
富士山で琵琶湖を埋められるか？
25mプールに一万円札を敷き詰めたら何枚必要か？
25mプールに一万円札を体積で詰めたら何枚必要か？`;
      } else {
        questionEl.placeholder = `例：
りんごが5個あります。3個食べました。残りはいくつですか？
100円のえんぴつを3本買いました。代金はいくらですか？
12個のあめを4人で同じ数ずつ分けると1人何個ですか？`;
      }
    }

    function escapeHtml(str){
      return String(str)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    function formatNumberWithComma(text){
      return text.replace(/\d{4,}(?:\.\d+)?/g, function(num){
        const n = Number(num.replace(/,/g, ""));
        return Number.isFinite(n) ? n.toLocaleString("ja-JP") : num;
      });
    }

    function buildComparisonHints(text){
      const hints = [];

      const kmMatches = [...text.matchAll(/(\d[\d,]*\.?\d*)\s*km/g)];
      for (const match of kmMatches) {
        const value = Number(match[1].replace(/,/g, ""));
        if (!Number.isFinite(value)) continue;
        const earthCircumference = 40075;
        const tokyoOsaka = 500;
        const moonDistance = 384400;

        hints.push(`・地球一周（約40,075 km）の約${(value / earthCircumference).toFixed(2)}周分`);
        hints.push(`・東京〜大阪（約500 km）の約${(value / tokyoOsaka).toFixed(2)}回分`);
        hints.push(`・地球から月まで（約384,400 km）の約${(value / moonDistance).toFixed(2)}回分`);
        return hints;
      }

      const mMatches = [...text.matchAll(/(\d[\d,]*\.?\d*)\s*m(?![a-z])/g)];
      for (const match of mMatches) {
        const value = Number(match[1].replace(/,/g, ""));
        if (!Number.isFinite(value)) continue;
        const tokyoTower = 333;
        const skytree = 634;

        hints.push(`・東京タワー（333 m）の約${(value / tokyoTower).toFixed(2)}本分`);
        hints.push(`・東京スカイツリー（634 m）の約${(value / skytree).toFixed(2)}本分`);
        return hints;
      }

      const yenMatches = [...text.matchAll(/(\d[\d,]*\.?\d*)\s*円/g)];
      for (const match of yenMatches) {
        const value = Number(match[1].replace(/,/g, ""));
        if (!Number.isFinite(value)) continue;

        hints.push(`・1,000円札なら約${(value / 1000).toFixed(2)}枚分`);
        hints.push(`・1万円札なら約${(value / 10000).toFixed(2)}枚分`);
        return hints;
      }

      const dayMatches = [...text.matchAll(/(\d[\d,]*\.?\d*)\s*日/g)];
      for (const match of dayMatches) {
        const value = Number(match[1].replace(/,/g, ""));
        if (!Number.isFinite(value)) continue;

        hints.push(`・約${(value / 30).toFixed(2)}か月分`);
        hints.push(`・約${(value / 365).toFixed(2)}年分`);
        return hints;
      }

      return hints;
    }

    function savePasscode(){
      try {
        localStorage.setItem(PASSCODE_STORAGE_KEY, passcodeEl.value.trim());
      } catch (e) {}
    }

    function loadPasscode(){
      try {
        const saved = localStorage.getItem(PASSCODE_STORAGE_KEY) || "";
        if (saved) {
          passcodeEl.value = saved;
        }
      } catch (e) {}
    }

    function renderPrepare(data){
      preparedData = data;

      const lines = [];
      lines.push("【問題】");
      lines.push(data.question || "");
      lines.push("");

      if (data.problem_type) {
        lines.push("【問題のタイプ】");
        lines.push(data.problem_type);
        lines.push("");
      }

      lines.push("【AIが考えた解き方】");
      lines.push(data.plan || "まだ整理できませんでした。");
      lines.push("");

      lines.push("【確認】");
      lines.push(data.confirmation_message || "下の前提候補を確認してください。");

      if (Array.isArray(data.missing_conditions) && data.missing_conditions.length) {
        lines.push("");
        lines.push("【結果が変わるポイント】");
        data.missing_conditions.forEach(v => lines.push(`・${v}`));
      }

      prepareSummaryEl.textContent = formatNumberWithComma(lines.join("\n"));

      if (data.ready_to_solve) {
        setBadge(prepareBadgeEl, "warn", "前提候補を確認してください");
      } else {
        setBadge(prepareBadgeEl, "bad", "このままでは計算できません");
      }

      renderAssumptionInputs(data.assumptions || []);
    }

    function renderAssumptionInputs(assumptions){
      assumptionListEl.innerHTML = "";

      if (!Array.isArray(assumptions) || assumptions.length === 0) {
        assumptionPanelEl.classList.add("hidden");
        return;
      }

      assumptionPanelEl.classList.remove("hidden");

      assumptions.forEach((item, index) => {
        const wrap = document.createElement("div");
        wrap.className = "assumption-item";

        const key = item.key || `assumption_${index + 1}`;
        const label = item.label || key;
        const value = item.value ?? "";
        const unit = item.unit || "";
        const description = item.description || "";
        const editable = item.editable !== false;

        wrap.innerHTML = `
          <div class="assumption-key">${escapeHtml(label)}</div>
          <div class="assumption-meta">key: ${escapeHtml(key)} ${unit ? " / 単位: " + escapeHtml(unit) : ""}</div>
          <div class="assumption-desc">${escapeHtml(description)}</div>
          <input
            type="text"
            data-key="${escapeHtml(key)}"
            data-label="${escapeHtml(label)}"
            data-unit="${escapeHtml(unit)}"
            data-description="${escapeHtml(description)}"
            value="${escapeHtml(value)}"
            ${editable ? "" : "readonly"}
          />
        `;
        assumptionListEl.appendChild(wrap);
      });
    }

    function collectAssumptionsFromUI(){
      const inputs = assumptionListEl.querySelectorAll("input[data-key]");
      return Array.from(inputs).map(input => ({
        key: input.dataset.key || "",
        label: input.dataset.label || "",
        unit: input.dataset.unit || "",
        description: input.dataset.description || "",
        value: input.value.trim()
      }));
    }

    function renderSolve(data){
      const lines = [];

      lines.push("【問題】");
      lines.push(data.question || "");
      lines.push("");

      if (data.problem_type) {
        lines.push("【問題のタイプ】");
        lines.push(data.problem_type);
        lines.push("");
      }

      if (Array.isArray(data.assumptions_used) && data.assumptions_used.length) {
        lines.push("【使った前提】");
        data.assumptions_used.forEach(v => lines.push(`・${v}`));
        lines.push("");
      }

      if (Array.isArray(data.used_values) && data.used_values.length) {
        lines.push("【使った数値】");
        data.used_values.forEach(v => lines.push(`・${v}`));
        lines.push("");
      }

      if (Array.isArray(data.reasoning_steps) && data.reasoning_steps.length) {
        lines.push("【考え方の流れ】");
        data.reasoning_steps.forEach((v, i) => lines.push(`${i + 1}. ${v}`));
        lines.push("");
      }

      if (Array.isArray(data.calculation_steps) && data.calculation_steps.length) {
        lines.push("【計算の途中】");
        data.calculation_steps.forEach((v, i) => lines.push(`${i + 1}. ${v}`));
        lines.push("");
      }

      if (data.final_formula) {
        lines.push("【式】");
        lines.push(data.final_formula);
        lines.push("");
      }

      if (data.interpretation) {
        lines.push("【この結果の意味】");
        lines.push(data.interpretation);
        lines.push("");
      }

      lines.push("【結論】");
      lines.push(data.conclusion || "結論を出せませんでした。");

      if (Array.isArray(data.notes) && data.notes.length) {
        lines.push("");
        lines.push("【補足】");
        data.notes.forEach(v => lines.push(`・${v}`));
      }

      const mainText = formatNumberWithComma(lines.join("\n"));
      const comparisonHints = buildComparisonHints(mainText);

      let finalText = mainText;
      if (comparisonHints.length) {
        finalText += "\n\n【イメージしやすい比較】\n" + comparisonHints.join("\n");
      }

      resultOutputEl.textContent = finalText;

      if (data.can_answer) {
        setBadge(resultBadgeEl, "ok", "途中経過つきで計算しました");
      } else {
        setBadge(resultBadgeEl, "bad", "計算できませんでした");
      }
    }

    async function requestWorker(payload){
      const passcode = passcodeEl.value.trim();

      if (!passcode) {
        throw new Error("パスコードを入力してください。");
      }

      savePasscode();

      const res = await fetch(WORKER_URL, {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "X-App-Passcode": passcode
        },
        body: JSON.stringify(payload)
      });

      const text = await res.text();

      let data;
      try {
        data = JSON.parse(text);
      } catch {
        throw new Error("Workerの返答がJSONではありません。\n\n" + text);
      }

      if (!res.ok || data.error) {
        throw new Error(data.error || "エラーが発生しました。");
      }

      return data;
    }

    async function callPrepare(){
      const question = questionEl.value.trim();

      if (!question) {
        setStatus("まず問題文を入力してください。");
        setBadge(prepareBadgeEl, "bad", "入力が必要です");
        prepareSummaryEl.textContent = "問題文が空です。";
        return;
      }

      setStatus("前提候補を整理しています...");
      prepareBtn.disabled = true;
      solveBtn.disabled = true;
      clearBtn.disabled = true;
      editBtn.disabled = true;
      micBtn.disabled = true;
      resetAssumptionsBtn.disabled = true;

      try {
        const data = await requestWorker({
          action: "prepare",
          mode: currentMode,
          question
        });

        renderPrepare(data);
        resultOutputEl.textContent = "ここに、途中経過・式・結論が表示されます。";
        resultBadgeEl.innerHTML = "";
        setStatus("前提候補を表示しました。");
      } catch (err) {
        console.error(err);
        setBadge(prepareBadgeEl, "bad", "エラー");
        prepareSummaryEl.textContent = "エラーが発生しました。\n\n" + (err.message || String(err));
        setStatus("エラーが発生しました。");
      } finally {
        prepareBtn.disabled = false;
        solveBtn.disabled = false;
        clearBtn.disabled = false;
        editBtn.disabled = false;
        micBtn.disabled = false;
        resetAssumptionsBtn.disabled = false;
      }
    }

    async function callSolve(){
      const question = questionEl.value.trim();

      if (!question) {
        setStatus("まず問題文を入力してください。");
        return;
      }

      if (!preparedData) {
        setStatus("先に「質問する」を押してください。");
        return;
      }

      const finalAssumptions = collectAssumptionsFromUI();

      setStatus("確定前提で計算しています...");
      prepareBtn.disabled = true;
      solveBtn.disabled = true;
      clearBtn.disabled = true;
      editBtn.disabled = true;
      micBtn.disabled = true;
      resetAssumptionsBtn.disabled = true;

      try {
        const data = await requestWorker({
          action: "solve",
          mode: currentMode,
          question,
          assumptions: finalAssumptions
        });

        renderSolve(data);
        setStatus("計算結果を表示しました。");
      } catch (err) {
        console.error(err);
        setBadge(resultBadgeEl, "bad", "エラー");
        resultOutputEl.textContent = "エラーが発生しました。\n\n" + (err.message || String(err));
        setStatus("エラーが発生しました。");
      } finally {
        prepareBtn.disabled = false;
        solveBtn.disabled = false;
        clearBtn.disabled = false;
        editBtn.disabled = false;
        micBtn.disabled = false;
        resetAssumptionsBtn.disabled = false;
      }
    }

    function resetAssumptions(){
      preparedData = null;
      assumptionListEl.innerHTML = "";
      assumptionPanelEl.classList.add("hidden");
      prepareSummaryEl.textContent = "ここに、AIが整理した前提候補の要約が表示されます。";
      prepareBadgeEl.innerHTML = "";
      resultOutputEl.textContent = "ここに、途中経過・式・結論が表示されます。";
      resultBadgeEl.innerHTML = "";
      setStatus("前提候補を消しました。");
    }

    function clearAll(){
      questionEl.value = "";
      preparedData = null;
      prepareSummaryEl.textContent = "ここに、AIが整理した前提候補の要約が表示されます。";
      resultOutputEl.textContent = "ここに、途中経過・式・結論が表示されます。";
      prepareBadgeEl.innerHTML = "";
      resultBadgeEl.innerHTML = "";
      assumptionListEl.innerHTML = "";
      assumptionPanelEl.classList.add("hidden");
      stopSpeaking();
      stopListening();
      setStatus("待機中です。");
      questionEl.focus();
    }

    function endApp(){
  stopListening();
  stopSpeaking();

  document.body.innerHTML = `
    <div style="
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;
      height:100vh;
      background:#f7f7fb;
      font-family:sans-serif;
      text-align:center;
      padding:20px;
    ">
      <div style="
        font-size:26px;
        font-weight:900;
        margin-bottom:20px;
      ">
        アプリを終了しました
      </div>

      <button onclick="location.reload()" style="
        padding:14px 28px;
        font-size:18px;
        border-radius:14px;
        border:none;
        background:#4f46e5;
        color:white;
        font-weight:900;
      ">
        再開
      </button>
    </div>
  `;
}

    function editQuestion(){
      questionEl.focus();
      questionEl.selectionStart = questionEl.value.length;
      questionEl.selectionEnd = questionEl.value.length;
      setStatus("問題文を編集できます。");
    }

    function speakText(text){
      if (!("speechSynthesis" in window)) {
        setStatus("このブラウザは読み上げに対応していません。");
        return;
      }
      stopSpeaking();

      const cleanText = String(text || "").trim();
      if (!cleanText) {
        setStatus("読む内容がありません。");
        return;
      }

      const utterance = new SpeechSynthesisUtterance(cleanText);
      utterance.lang = "ja-JP";
      utterance.rate = 1.0;
      utterance.pitch = 1.0;

      speaking = true;
      utterance.onend = () => {
        speaking = false;
        setStatus("待機中です。");
      };
      utterance.onerror = () => {
        speaking = false;
        setStatus("読み上げでエラーが発生しました。");
      };

      window.speechSynthesis.speak(utterance);
      setStatus("読み上げています...");
    }

    function stopSpeaking(){
      if ("speechSynthesis" in window) {
        window.speechSynthesis.cancel();
      }
      speaking = false;
    }

   function normalizeVoiceText(text){
  return String(text || "")
    .trim()
    .replace(/[。．、]/g, "")
    .replace(/\s+/g, "")
    .toLowerCase();
}
    function initSpeechInput(){
      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (!SpeechRecognition) {
        return null;
      }

      const rec = new SpeechRecognition();
      rec.lang = "ja-JP";
      rec.interimResults = false;
      rec.continuous = false;
      rec.maxAlternatives = 1;

      rec.onstart = () => {
        isListening = true;
        micBtn.textContent = "🎤 聞いています...";
        setStatus("問題文を聞いています...");
      };

      rec.onresult = (event) => {
  const rawText = event.results?.[0]?.[0]?.transcript || "";
  const text = normalizeVoiceText(rawText);

  if (!text) return;

  // ===== 音声コマンド =====
  if (text.includes("終了")) {
    endApp();
    return;
  }

  if (text.includes("質問") || text.includes("考えて")) {
    questionEl.value = rawText;
    callPrepare();
    return;
  }

  if (text.includes("計算")) {
    callSolve();
    return;
  }

  // ===== 通常入力 =====
  questionEl.value = rawText;
  setStatus("問題文を音声入力しました。");
};

      rec.onerror = (event) => {
        const err = event.error || "unknown";
        if (err === "not-allowed") {
          setStatus("マイクの許可が必要です。");
        } else if (err === "no-speech") {
          setStatus("音声が聞き取れませんでした。");
        } else {
          setStatus("音声入力エラー: " + err);
        }
      };

      rec.onend = () => {
        isListening = false;
        micBtn.textContent = "🎤 音声入力";
      };

      return rec;
    }

    async function startListening(){
      if (!recognition) {
        recognition = initSpeechInput();
      }
      if (!recognition) {
        alert("このブラウザは音声入力に対応していません。");
        return;
      }
      try {
        recognition.start();
      } catch (e) {
        setStatus("音声入力を開始できませんでした。");
      }
    }

    function stopListening(){
      if (recognition && isListening) {
        try {
          recognition.stop();
        } catch (e) {}
      }
      isListening = false;
      micBtn.textContent = "🎤 音声入力";
    }

    modeWeirdBtn.addEventListener("click", () => setMode("weird"));
    modeKidBtn.addEventListener("click", () => setMode("kid"));

    prepareBtn.addEventListener("click", callPrepare);
    solveBtn.addEventListener("click", callSolve);
    clearBtn.addEventListener("click", clearAll);
    editBtn.addEventListener("click", editQuestion);
    resetAssumptionsBtn.addEventListener("click", resetAssumptions);
    endBtn.addEventListener("click", endApp);

    micBtn.addEventListener("click", async () => {
      if (isListening) {
        stopListening();
        setStatus("音声入力を停止しました。");
      } else {
        await startListening();
      }
    });

    speakQuestionBtn.addEventListener("click", () => {
      speakText(questionEl.value);
    });

    speakPrepareBtn.addEventListener("click", () => {
      speakText(prepareSummaryEl.textContent);
    });

    speakResultBtn.addEventListener("click", () => {
      speakText(resultOutputEl.textContent);
    });

    stopReadingBtn.addEventListener("click", () => {
      stopSpeaking();
      setStatus("読み上げを停止しました。");
    });

    passcodeEl.addEventListener("input", savePasscode);

    window.addEventListener("load", () => {
      loadPasscode();
      setMode("weird");
    });
  </script>
</body>
</html>
