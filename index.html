<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>確率計算機</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#0f172a;
  color:#fff;
}

.app{
  max-width:500px;
  margin:auto;
  padding:12px;
}

.title{
  text-align:center;
  font-size:24px;
  font-weight:900;
  margin-bottom:10px;
}

.digital{
  text-align:center;
  font-size:60px;
  font-weight:900;
  margin-bottom:10px;
}

textarea{
  width:100%;
  height:100px;
  font-size:16px;
  border-radius:10px;
  padding:10px;
  border:none;
}

button{
  width:100%;
  margin-top:10px;
  padding:14px;
  font-size:18px;
  font-weight:900;
  border:none;
  border-radius:10px;
  background:#2563eb;
  color:#fff;
}

.result{
  margin-top:15px;
  background:#fff;
  color:#000;
  padding:12px;
  border-radius:10px;
  white-space:pre-wrap;
}
</style>
</head>

<body>

<div class="app">

<div class="title">確率計算機</div>

<div class="digital" id="display">000.0%</div>

<input type="password" id="passcode" placeholder="パスコード" style="width:100%;padding:10px;border-radius:10px;border:none;margin-bottom:8px;">

<textarea id="input" placeholder="例：ドジャース優勝確率は？"></textarea>

<button onclick="send()">測る</button>

<div class="result" id="result"></div>

</div>

<script>

const WORKER_URL = "https://YOUR-WORKER.workers.dev/measure";

function animateNumber(target){
  let current = 0;
  const interval = setInterval(()=>{
    current += Math.random()*5;
    if(current >= target){
      current = target;
      clearInterval(interval);
    }
    document.getElementById("display").innerText =
      current.toFixed(1).padStart(5,"0") + "%";
  },30);
}

async function send(){

  const text = document.getElementById("input").value;
  const pass = document.getElementById("passcode").value;

  const res = await fetch(WORKER_URL,{
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({
      input:text,
      passcode:pass
    })
  });

  const data = await res.json();

  animateNumber(data.probability || 0);

  document.getElementById("result").innerText =
    data.analysis || "結果なし";
}

</script>

</body>
</html>
