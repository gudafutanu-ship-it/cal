<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>条件整理型 計算AI</title>
  <style>
    :root{
      --bg1:#0f172a;
      --bg2:#1e293b;
      --card:#ffffff;
      --text:#0f172a;
      --muted:#64748b;
      --line:#e2e8f0;
      --accent:#2563eb;
      --accent2:#7c3aed;
      --shadow:0 18px 44px rgba(2,6,23,.22);
      --radius:22px;
    }
    *{ box-sizing:border-box; }
    html,body{
      margin:0;
      padding:0;
      min-height:100%;
      background:linear-gradient(180deg,var(--bg1),var(--bg2));
      font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic","Noto Sans JP",sans-serif;
      color:#fff;
      -webkit-text-size-adjust:100%;
    }
    body{ min-height:100vh; }
    .app{
      max-width:720px;
      margin:0 auto;
      padding:max(12px, env(safe-area-inset-top)) 12px max(18px, env(safe-area-inset-bottom)) 12px;
    }
    .hero{
      text-align:center;
      padding:4px 6px 8px;
    }
    .title{
      font-size:28px;
      font-weight:900;
      margin:0 0 6px;
    }
    .subtitle{
      font-size:13px;
      color:rgba(255,255,255,.78);
      margin:0;
      line-height:1.6;
    }
    .card{
      background:var(--card);
      color:var(--text);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      overflow:hidden;
    }
    .content-card{
      margin-top:10px;
      padding:12px;
    }
    .label{
      font-size:13px;
      font-weight:900;
      color:#334155;
      margin:0 0 8px;
    }
    .pass-row{
      display:flex;
      gap:8px;
      align-items:center;
      flex-wrap:wrap;
      margin-bottom:12px;
    }
    input[type="password"]{
      flex:1;
      min-width:180px;
      border:1.5px solid var(--line);
      border-radius:14px;
      padding:12px 14px;
      font-size:16px;
      outline:none;
      background:#fff;
      color:#0f172a;
    }
    input[type="password"]:focus,
    textarea:focus{
      border-color:#93c5fd;
      box-shadow:0 0 0 4px rgba(37,99,235,.10);
    }
    textarea{
      width:100%;
      min-height:132px;
      resize:vertical;
      border:1.5px solid var(--line);
      border-radius:16px;
      padding:14px;
      font-size:16px;
      line-height:1.6;
      outline:none;
      background:#fff;
      color:#0f172a;
    }
    .btn-row{
      display:flex;
      gap:10px;
      margin-top:12px;
      flex-wrap:wrap;
    }
    button{
      appearance:none;
      border:none;
      border-radius:14px;
      padding:13px 16px;
      font-size:16px;
      font-weight:900;
      cursor:pointer;
      transition:transform .08s ease, opacity .18s ease, box-shadow .18s ease, background .18s ease;
    }
    button:active{ transform:translateY(1px) scale(.995); }
    .primary{
      flex:1;
      min-width:150px;
      color:#fff;
      background:linear-gradient(135deg,var(--accent),var(--accent2));
      box-shadow:0 8px 20px rgba(37,99,235,.28);
    }
    .secondary{
      background:#eef2ff;
      color:#3730a3;
    }
    .ghost{
      background:#f8fafc;
      color:#334155;
      border:1px solid var(--line);
    }
    .mic-btn{
      background:#eff6ff;
      color:#1d4ed8;
      border:1px solid #bfdbfe;
    }
    .mic-btn.listening{
      background:#fee2e2;
      color:#b91c1c;
      border:1px solid #fecaca;
    }
    .speak-btn{
      background:#f5f3ff;
      color:#6d28d9;
      border:1px solid #ddd6fe;
    }
    .live-banner{
      display:none;
      margin-top:12px;
      padding:14px;
      border-radius:18px;
      background:linear-gradient(135deg, rgba(14,165,233,.18), rgba(37,99,235,.14)), linear-gradient(180deg, #f8fbff, #eef6ff);
      border:1px solid rgba(56,189,248,.38);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.65);
    }
    .live-banner.show{ display:block; }
    .live-head{
      display:flex;
      align-items:center;
      gap:10px;
      margin-bottom:6px;
    }
    .live-dot{
      width:12px;
      height:12px;
      border-radius:999px;
      background:#0ea5e9;
      box-shadow:0 0 0 0 rgba(14,165,233,.58);
      animation:pulse 1.4s infinite;
      flex:0 0 12px;
    }
    @keyframes pulse{
      0% { box-shadow:0 0 0 0 rgba(14,165,233,.58); }
      70% { box-shadow:0 0 0 14px rgba(14,165,233,0); }
      100% { box-shadow:0 0 0 0 rgba(14,165,233,0); }
    }
    .live-title{
      font-size:13px;
      font-weight:900;
      letter-spacing:.08em;
      color:#0c4a6e;
    }
    .live-text{
      font-size:13px;
      color:#0f172a;
      line-height:1.6;
      font-weight:700;
    }
    .reply-card{
      margin-top:10px;
      padding:12px;
    }
    .bubble{
      border-radius:18px;
      padding:12px 14px;
      line-height:1.72;
      font-size:15px;
      white-space:pre-wrap;
      word-break:break-word;
    }
    .bubble + .bubble{ margin-top:10px; }
    .bubble.user{
      background:#eff6ff;
      color:#1e3a8a;
      border:1px solid #dbeafe;
    }
    .bubble.ai{
      background:#f8fafc;
      color:#0f172a;
      border:1px solid #e2e8f0;
    }
    .bubble.system{
      background:#fff7ed;
      color:#9a3412;
      border:1px solid #fed7aa;
    }
    .footer-note{
      margin-top:10px;
      font-size:12px;
      color:rgba(255,255,255,.75);
      text-align:center;
      line-height:1.6;
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="hero">
      <h1 class="title">条件整理型 計算AI</h1>
      <p class="subtitle">条件が足りなければ確認し、そろったら式で答えます</p>
    </div>

    <section class="card content-card">
      <div class="label">パスコード</div>
      <div class="pass-row">
        <input type="password" id="passcodeInput" placeholder="パスコードを入力" />
        <button class="secondary" id="savePassBtn" type="button">保存</button>
      </div>

      <div class="label">質問</div>
      <textarea id="userInput" placeholder="例：宝くじが10枚あります。この10枚が1等に当たる確率は？
例：1億円を10年で使い切ると1日いくら使えますか？
例：月まで歩くと何日かかりますか？"></textarea>

      <div class="btn-row">
        <button class="mic-btn" id="micBtn" type="button">🎤 話す</button>
        <button class="primary" id="sendBtn" type="button">送る</button>
      </div>

      <div class="btn-row">
        <button class="speak-btn" id="speakBtn" type="button">🔊 答えを聞く</button>
        <button class="secondary" id="retryBtn" type="button">もう一度聞く</button>
        <button class="ghost" id="clearBtn" type="button">クリア</button>
      </div>

      <div id="liveBanner" class="live-banner">
        <div class="live-head">
          <div class="live-dot"></div>
          <div class="live-title">分析中</div>
        </div>
        <div class="live-text">条件を整理し、必要なら確認し、計算可能なら式を作っています…</div>
      </div>
    </section>

    <section class="card reply-card">
      <div id="chatArea">
        <div class="bubble system">ここにAIの確認質問や計算結果が表示されます。</div>
      </div>
    </section>

    <div class="footer-note">
      結論 / 根拠データ / 計算式 / 判定 の形で返します
    </div>
  </div>

  <script>
    const WORKER_URL = "https://cal.gudafutanu.workers.dev/measure";

    const userInput = document.getElementById("userInput");
    const passcodeInput = document.getElementById("passcodeInput");
    const savePassBtn = document.getElementById("savePassBtn");

    const sendBtn = document.getElementById("sendBtn");
    const retryBtn = document.getElementById("retryBtn");
    const clearBtn = document.getElementById("clearBtn");
    const micBtn = document.getElementById("micBtn");
    const speakBtn = document.getElementById("speakBtn");
    const chatArea = document.getElementById("chatArea");
    const liveBanner = document.getElementById("liveBanner");

    let history = [];
    let lastAiText = "";
    let recognition = null;
    let listening = false;

    function addBubble(role, text) {
      const div = document.createElement("div");
      div.className = "bubble " + role;
      div.textContent = text;
      chatArea.appendChild(div);
      chatArea.scrollTop = chatArea.scrollHeight;
    }

    function clearChat() {
      chatArea.innerHTML = "";
      addBubble("system", "ここにAIの確認質問や計算結果が表示されます。");
    }

    function setBusy(flag) {
      sendBtn.disabled = flag;
      retryBtn.disabled = flag;
      sendBtn.style.opacity = flag ? ".7" : "1";
      retryBtn.style.opacity = flag ? ".7" : "1";
      liveBanner.classList.toggle("show", flag);
    }

    function getSavedPasscode() {
      return localStorage.getItem("calc_ai_passcode") || "";
    }

    function savePasscode() {
      localStorage.setItem("calc_ai_passcode", passcodeInput.value.trim());
    }

    function speakText(text) {
      if (!text) {
        alert("まだ結果がありません。");
        return;
      }
      if (!("speechSynthesis" in window)) {
        alert("この端末では読み上げに対応していません。");
        return;
      }
      window.speechSynthesis.cancel();
      const utter = new SpeechSynthesisUtterance(text);
      utter.lang = "ja-JP";
      utter.rate = 1;
      utter.pitch = 1;
      window.speechSynthesis.speak(utter);
    }

    function setupRecognition() {
      const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (!SR) return null;

      const rec = new SR();
      rec.lang = "ja-JP";
      rec.interimResults = false;
      rec.continuous = false;

      rec.onstart = () => {
        listening = true;
        micBtn.classList.add("listening");
        micBtn.textContent = "🔴 聞いています";
      };

      rec.onend = () => {
        listening = false;
        micBtn.classList.remove("listening");
        micBtn.textContent = "🎤 話す";
      };

      rec.onerror = (e) => {
        addBubble("system", "音声入力エラー: " + (e.error || "unknown"));
      };

      rec.onresult = (e) => {
        const transcript = Array.from(e.results)
          .map(result => result[0]?.transcript || "")
          .join("")
          .trim();
        if (transcript) userInput.value = transcript;
      };

      return rec;
    }

    async function askAI() {
      const text = userInput.value.trim();
      const passcode = passcodeInput.value.trim() || getSavedPasscode();

      if (!text) {
        alert("質問を入力してください。");
        return;
      }
      if (!passcode) {
        alert("先にパスコードを入力してください。");
        return;
      }

      addBubble("user", text);
      history.push({ role: "user", content: text });
      userInput.value = "";

      setBusy(true);

      try {
        const res = await fetch(WORKER_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            input: text,
            history,
            passcode
          })
        });

        const data = await res.json();

        if (!res.ok) {
          throw new Error(data.error || "通信エラー");
        }

        let outputText = "";

        if (data.mode === "ask") {
          outputText = data.question || "不足条件があります。";
        } else if (data.mode === "answer") {
          outputText = data.result || "結果なし";
        } else {
          outputText = JSON.stringify(data, null, 2);
        }

        addBubble("ai", outputText);
        history.push({
          role: "assistant",
          content: outputText
        });

        lastAiText = outputText;

      } catch (err) {
        addBubble("system", "エラー: " + err.message);
      } finally {
        setBusy(false);
      }
    }

    savePassBtn.addEventListener("click", savePasscode);
    sendBtn.addEventListener("click", askAI);

    retryBtn.addEventListener("click", () => {
      const lastUser = [...history].reverse().find(x => x.role === "user");
      if (!lastUser) {
        alert("まだ質問がありません。");
        return;
      }
      userInput.value = lastUser.content;
      askAI();
    });

    clearBtn.addEventListener("click", () => {
      history = [];
      lastAiText = "";
      userInput.value = "";
      clearChat();
      window.speechSynthesis?.cancel();
    });

    speakBtn.addEventListener("click", () => speakText(lastAiText));

    micBtn.addEventListener("click", () => {
      if (!recognition) {
        alert("この端末では音声入力に対応していません。");
        return;
      }
      if (listening) {
        recognition.stop();
        return;
      }
      try {
        recognition.start();
      } catch (e) {
        addBubble("system", "音声入力を開始できませんでした。もう一度押してください。");
      }
    });

    passcodeInput.value = getSavedPasscode();
    recognition = setupRecognition();
    clearChat();
  </script>
</body>
</html>
